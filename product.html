<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produto | MANTO BRASIL</title>
  <meta name="description" content="Detalhes do produto MANTO BRASIL." />
  <link rel="icon" type="image/png" href="./assets/images/FAVICON.png" />
  <link rel="stylesheet" href="./styles/theme.css" />
  <link rel="stylesheet" href="./styles/animations.css" />
  <style>
    .product-page {
      min-height: 100vh;
      padding: 28px 0 60px;
      background: var(--color-bg);
    }

    .product-nav {
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--color-gold);
      font-size: var(--fs-sm);
      text-decoration: none;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: var(--font-display);
      font-weight: 700;
    }

    .product-layout {
      display: grid;
      gap: 28px;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
      align-items: start;
    }

    .gallery-main {
      background: #0d0d0d;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-main img,
    .gallery-main video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .main-media-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .main-media-fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      opacity: 1;
      transition: opacity 220ms ease;
    }

    .main-media-video {
      position: relative;
      z-index: 2;
      background: #0d0d0d;
    }

    .main-media-wrapper.is-ready .main-media-fallback {
      opacity: 0;
      pointer-events: none;
    }

    .gallery-thumbs {
      margin-top: 12px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    }

    .thumb-btn {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #0f0f0f;
      cursor: pointer;
      aspect-ratio: 1/1;
    }

    .thumb-btn.active {
      border-color: var(--color-border-gold);
      box-shadow: 0 0 0 2px rgba(197,160,89,0.2);
    }

    .thumb-btn img,
    .thumb-btn video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-panel {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .product-subtitle {
      color: var(--color-gold);
      font-family: var(--font-display);
      font-size: var(--fs-xs);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .product-title {
      font-family: var(--font-titulo);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      line-height: 1.15;
    }

    .product-copy {
      color: var(--color-text-secondary);
      line-height: 1.75;
      font-size: var(--fs-sm);
    }

    .price-wrap {
      border: 1px solid var(--color-border-gold);
      border-radius: var(--radius-md);
      background: var(--gradient-gold-subtle);
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .price-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .price-badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(76, 175, 80, 0.16);
      border: 1px solid rgba(76, 175, 80, 0.55);
      color: #74d77b;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .price-old {
      color: var(--color-text-muted);
      text-decoration: line-through;
      font-size: var(--fs-sm);
    }

    .price-now {
      font-family: var(--font-display);
      color: #4CAF50;
      font-size: clamp(1.8rem, 4vw, 2.3rem);
      line-height: 1;
      font-weight: 900;
    }

    .price-installments {
      color: var(--color-text-secondary);
      font-size: var(--fs-xs);
    }

    .selectors-grid {
      display: grid;
      gap: 12px;
    }

    .selector-label {
      font-size: var(--fs-xs);
      font-family: var(--font-display);
      letter-spacing: 0.08em;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .selector-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .choice-btn {
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      background: transparent;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: var(--fs-xs);
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .choice-btn.active {
      border-color: var(--color-border-gold);
      color: var(--color-gold);
      background: rgba(197,160,89,0.08);
    }

    .feature-list {
      list-style: none;
      display: grid;
      gap: 8px;
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px solid var(--color-border);
    }

    .feature-list li {
      color: var(--color-text-secondary);
      font-size: var(--fs-sm);
    }

    .shipping-box {
      border: 1px solid var(--color-border-gold);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      background: rgba(197,160,89,0.08);
      color: var(--color-text-primary);
      font-size: var(--fs-sm);
      line-height: 1.5;
    }

    .shipping-box strong {
      color: var(--color-gold);
      font-weight: 700;
    }

    .trigger-list {
      display: grid;
      gap: 6px;
      font-size: var(--fs-xs);
      color: var(--color-text-secondary);
    }

    .trigger-list strong {
      color: var(--color-text-primary);
    }

    .payment-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .payment-pill {
      border: 1px solid var(--color-border);
      background: #111;
      border-radius: 8px;
      color: var(--color-text-secondary);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 6px 10px;
    }

    .cta-row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .empty-state {
      text-align: center;
      color: var(--color-text-secondary);
      padding: 50px 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-bg-card);
    }

    @media (max-width: 900px) {
      .product-layout {
        grid-template-columns: 1fr;
      }

      .cta-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="product-page">
    <div class="container">
      <a class="product-nav" href="./index.html#catalogo">← Voltar para catálogo</a>
      <div id="product-root"></div>
    </div>
  </main>

  <script type="module">
    const root = document.getElementById('product-root');

    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    function brl(value) {
      return Number.parseFloat(value).toLocaleString('pt-BR', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function isVideo(path) {
      return typeof path === 'string' && /\.(mp4|webm|ogg)$/i.test(path);
    }

    function renderMainMedia(path, posterPath = '') {
      if (isVideo(path)) {
        const poster = posterPath || '';
        return `
          <div class="main-media-wrapper" data-main-media-wrapper>
            <img class="main-media-fallback" src="${poster}" alt="Preview do produto" loading="eager" />
            <video
              class="main-media-video"
              src="${path}"
              poster="${poster}"
              autoplay
              loop
              muted
              playsinline
              controls
              preload="auto"
            ></video>
          </div>
        `;
      }
      return `<img src="${path}" alt="Imagem principal do produto" loading="eager" />`;
    }

    function renderThumb(path) {
      if (isVideo(path)) {
        return `<video src="${path}" muted playsinline preload="metadata"></video>`;
      }
      return `<img src="${path}" alt="" loading="lazy" />`;
    }

    async function detectCityByIP() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        if (res.ok) {
          const data = await res.json();
          if (data && data.city) return data.city;
        }
      } catch (err) {
        // tenta fallback abaixo
      }

      try {
        const resFallback = await fetch('https://ipwho.is/');
        if (resFallback.ok) {
          const fallbackData = await resFallback.json();
          if (fallbackData && fallbackData.city) return fallbackData.city;
        }
      } catch (err) {
        // sem localização por IP
      }

      return 'sua região';
    }

    async function mountProduto(produto) {
      const media = Array.isArray(produto.galeria) && produto.galeria.length
        ? produto.galeria
        : [produto.thumbnail].filter(Boolean);

      const precoOriginal = brl(produto.preco_original);
      const precoAtual = brl(produto.preco_atual);
      const economia = brl(Number.parseFloat(produto.preco_original) - Number.parseFloat(produto.preco_atual));
      const resumo = produto.descricao_longa || produto.descricao || '';
      const cidade = await detectCityByIP();
      const tamanhos = Array.isArray(produto.tamanhos) && produto.tamanhos.length ? produto.tamanhos : ['P', 'M', 'G', 'GG'];
      const initialSize = tamanhos.includes('G') ? 'G' : tamanhos[0];
      const viewCount = Math.floor(Math.random() * 16) + 18;

      root.innerHTML = `
        <section class="product-layout">
          <div>
            <div class="gallery-main" id="gallery-main">${renderMainMedia(media[0], produto.thumbnail || media[0])}</div>
            <div class="gallery-thumbs">
              ${media.map((item, i) => `
                <button class="thumb-btn ${i === 0 ? 'active' : ''}" data-media="${item}">
                  ${renderThumb(item)}
                </button>
              `).join('')}
            </div>
          </div>

          <article class="product-panel">
            <p class="product-subtitle">${produto.subtitulo || 'Coleção 2026/27'}</p>
            <h1 class="product-title">${produto.nome}</h1>

            <ul class="feature-list">
              ${(produto.caracteristicas || []).map((item) => `<li>• ${item}</li>`).join('')}
            </ul>

            <div class="price-wrap">
              <div class="price-topline">
                <span class="price-old">De R$ ${precoOriginal}</span>
                <span class="price-badge">Economize R$ ${economia}</span>
              </div>
              <strong class="price-now">R$ ${precoAtual}</strong>
              <span class="price-installments">ou 12x de R$ ${(Number.parseFloat(produto.preco_atual) / 12).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} sem juros</span>
            </div>

            <div class="selectors-grid">
              <div>
                <span class="selector-label">Modelagem</span>
                <div class="selector-options" id="gender-options">
                  <button class="choice-btn active" data-gender="masculina" type="button">Masculina</button>
                  <button class="choice-btn" data-gender="feminina" type="button">Feminina</button>
                </div>
              </div>

              <div>
                <span class="selector-label">Tamanho</span>
                <div class="selector-options" id="size-options">
                  ${tamanhos.map((size) => `<button class="choice-btn ${size === initialSize ? 'active' : ''}" data-size="${size}" type="button">${size}</button>`).join('')}
                </div>
              </div>
            </div>

            <div class="shipping-box">
              Frete Grátis para <strong>${cidade}</strong><br />
              <span style="color: var(--color-text-secondary); font-size: 12px;">Localização aproximada por IP.</span>
            </div>

            <div>
              <span class="selector-label">Formas de pagamento</span>
              <div class="payment-list">
                <span class="payment-pill">PIX</span>
                <span class="payment-pill">VISA</span>
                <span class="payment-pill">MASTER</span>
                <span class="payment-pill">ELO</span>
                <span class="payment-pill">BOLETO</span>
              </div>
            </div>

            <div class="cta-row">
              <a href="${produto.link_compra}" id="buy-now-btn" class="btn-primary ripple-container" target="_blank" rel="noopener noreferrer">Comprar agora</a>
              <a href="./index.html#catalogo" class="btn-outline ripple-container">Ver outras camisas</a>
            </div>

            <div class="trigger-list">
              <span>🔥 <strong>${produto.estoque || 'Últimas unidades'}</strong></span>
              <span>👀 <strong>${viewCount} pessoas</strong> visualizando este produto agora</span>
              <span>🚚 Compra aprovada até 17h: envio em até 24h</span>
            </div>

            <p class="product-copy">${resumo}</p>
          </article>
        </section>
      `;

      const main = document.getElementById('gallery-main');
      const thumbs = root.querySelectorAll('.thumb-btn');
      const buyNowBtn = document.getElementById('buy-now-btn');
      const genderBtns = root.querySelectorAll('[data-gender]');
      const sizeBtns = root.querySelectorAll('[data-size]');
      let selectedGender = 'masculina';
      let selectedSize = initialSize;

      const updateBuyLink = () => {
        try {
          const url = new URL(produto.link_compra);
          url.searchParams.set('genero', selectedGender);
          url.searchParams.set('tamanho', selectedSize);
          buyNowBtn.setAttribute('href', url.toString());
        } catch (err) {
          // fallback para links placeholder/inválidos
          buyNowBtn.setAttribute('href', produto.link_compra);
        }
      };

      thumbs.forEach((btn) => {
        btn.addEventListener('click', () => {
          const path = btn.getAttribute('data-media');
          main.innerHTML = renderMainMedia(path, produto.thumbnail || path);
          initMainMediaFallback();
          thumbs.forEach((x) => x.classList.remove('active'));
          btn.classList.add('active');
        });
      });

      genderBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          genderBtns.forEach((item) => item.classList.remove('active'));
          btn.classList.add('active');
          selectedGender = btn.getAttribute('data-gender') || 'masculina';
          updateBuyLink();
        });
      });

      sizeBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          sizeBtns.forEach((item) => item.classList.remove('active'));
          btn.classList.add('active');
          selectedSize = btn.getAttribute('data-size') || initialSize;
          updateBuyLink();
        });
      });

      updateBuyLink();
      initMainMediaFallback();
    }

    function initMainMediaFallback() {
      const wrapper = document.querySelector('[data-main-media-wrapper]');
      if (!wrapper) return;
      const video = wrapper.querySelector('video');
      if (!video) return;

      const markReady = () => wrapper.classList.add('is-ready');
      const markError = () => wrapper.classList.remove('is-ready');

      if (video.readyState >= 2) {
        markReady();
      } else {
        video.addEventListener('loadeddata', markReady, { once: true });
        video.addEventListener('canplay', markReady, { once: true });
      }

      video.addEventListener('error', markError);
      video.addEventListener('stalled', markError);
    }

    async function init() {
      if (!slug) {
        root.innerHTML = `<div class="empty-state">Produto não informado. Volte ao catálogo e escolha um produto.</div>`;
        return;
      }

      try {
        const response = await fetch('./data/produtos.json');
        const data = await response.json();
        const produto = (data.produtos || []).find((item) => item.slug === slug);

        if (!produto) {
          root.innerHTML = `<div class="empty-state">Produto não encontrado. Verifique o link e tente novamente.</div>`;
          return;
        }

        await mountProduto(produto);
      } catch (err) {
        root.innerHTML = `<div class="empty-state">Erro ao carregar o produto. Tente novamente em instantes.</div>`;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
